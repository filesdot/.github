name: 📝 Markdown Lint & Link Check

on:
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: .markdownlint.json
          fix: false

  check-links:
    name: Check Links (Fast)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔗 Validate Links
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --no-progress --accept 200,429 --exclude-mail --exclude '^https://github.com/.*/issues/new' --verbose '**/*.md'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Output Report
        if: always()
        run: cat lychee/out.md || echo "No issues found"
